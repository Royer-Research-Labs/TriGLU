model:
  vocab_size: 50304
  n_layers: 20
  d_model: 512
  n_heads: 8
  ffn_hidden_size: 1376
  ffn_type: swiglu
  # At the five structural-control positions, width 2059 absorbs the complete
  # parameter budget of the removed mixer, RMSNorm, and ordinary width-1376
  # SwiGLU: 512 + 3*512*2059 = 2*512 + 4*512^2 + 3*512*1376.
  ffn_hidden_sizes:
    - 1376
    - 1376
    - 1376
    - 1376
    - 1376
    - 1376
    - 1376
    - 1376
    - 2059
    - 1376
    - 1376
    - 1376
    - 2059
    - 1376
    - 1376
    - 2059
    - 1376
    - 2059
    - 1376
    - 2059
  # Hold the canonical 20-layer residual-projection initialization scale fixed.
  residual_init_depth: 20
  context_length: 4096
  dropout: 0.0
  bias: false
  rope_theta: 10000.0
  norm_eps: 1.0e-5
  init_std: 0.02
  tie_embeddings: true
  # The five FFN-only blocks use y = x + SwiGLU_2059(RMSNorm(x)).
  # They deliberately remove the mixer normalization and residual update.
  layer_types:
    - attention
    - attention
    - attention
    - attention
    - attention
    - attention
    - attention
    - attention
    - ffn_only
    - attention
    - attention
    - attention
    - ffn_only
    - attention
    - attention
    - ffn_only
    - attention
    - ffn_only
    - attention
    - ffn_only

data:
  synthetic: false
  vocab_size: 50304
  train_path: data/fineweb_edu_10bt_1b/train.bin
  val_path: data/fineweb_edu_10bt_1b/val.bin
  train_tokens: 1000000000
  val_tokens: 5000000
  seed: 1337

training:
  output_dir: runs/20l_4k_1b/15a5_wide_swiglu_single_residual_front_blend
  device: auto
  dtype: auto
  compile: true
  batch_size: 16
  sequence_length: 4096
  gradient_accumulation_steps: 1
  max_steps: 15259
  learning_rate: 0.0003
  min_lr_ratio: 0.1
  warmup_steps: 1000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  grad_clip: 1.0
  fused_optimizer: true
  log_interval: 10
  eval_interval: 250
  eval_batches: 16
  checkpoint_interval: 0
  seed: 1337
