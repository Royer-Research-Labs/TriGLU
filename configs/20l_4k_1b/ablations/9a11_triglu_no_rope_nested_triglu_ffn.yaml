model:
  vocab_size: 50304
  n_layers: 20
  d_model: 512
  # Both roles at once: the 9a11 nested no-RoPE replacement placement AND the
  # no-RoPE triple-product FFN in every block. Width 1032 keeps the FFN budget
  # matched to the standard SwiGLU FFN (4*512*1032 == 3*512*1376), so this
  # config has exactly the 9a11 hybrid's parameter count and isolates the
  # effect of combining the two independently measured wins.
  ffn_hidden_size: 1032
  ffn_type: triglu_no_rope
  n_heads: 8
  context_length: 4096
  dropout: 0.0
  bias: false
  rope_theta: 10000.0
  norm_eps: 1.0e-5
  init_std: 0.02
  tie_embeddings: true
  layer_types:
    - attention
    - attention
    - attention
    - attention
    - attention
    - attention
    - triglu_no_rope
    - triglu_no_rope
    - attention
    - triglu_no_rope
    - triglu_no_rope
    - triglu_no_rope
    - attention
    - triglu_no_rope
    - triglu_no_rope
    - triglu_no_rope
    - attention
    - triglu_no_rope
    - triglu_no_rope
    - triglu_no_rope

data:
  synthetic: false
  vocab_size: 50304
  train_path: data/fineweb_edu_10bt_1b/train.bin
  val_path: data/fineweb_edu_10bt_1b/val.bin
  train_tokens: 1000000000
  val_tokens: 5000000
  seed: 1337

training:
  output_dir: runs/20l_4k_1b/9a11_triglu_no_rope_nested_triglu_ffn
  device: auto
  dtype: auto
  compile: true
  batch_size: 16
  sequence_length: 4096
  gradient_accumulation_steps: 1
  max_steps: 15259
  learning_rate: 0.0003
  min_lr_ratio: 0.1
  warmup_steps: 1000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  grad_clip: 1.0
  fused_optimizer: true
  log_interval: 10
  eval_interval: 250
  eval_batches: 16
  checkpoint_interval: 0
  seed: 1337
